name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_BUSINESS_EMAIL: ${{ secrets.NEXT_PUBLIC_BUSINESS_EMAIL }}
          NEXT_PUBLIC_BUSINESS_PHONE: ${{ secrets.NEXT_PUBLIC_BUSINESS_PHONE }}
          NEXT_PUBLIC_BUSINESS_ADDRESS: ${{ secrets.NEXT_PUBLIC_BUSINESS_ADDRESS }}
          NEXT_PUBLIC_BUSINESS_HOURS: ${{ secrets.NEXT_PUBLIC_BUSINESS_HOURS }}
          NEXT_PUBLIC_BUSINESS_COORDINATES_LAT: ${{ secrets.NEXT_PUBLIC_BUSINESS_COORDINATES_LAT }}
          NEXT_PUBLIC_BUSINESS_COORDINATES_LNG: ${{ secrets.NEXT_PUBLIC_BUSINESS_COORDINATES_LNG }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
